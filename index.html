<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#15803d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>🌿 健康管理 App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f8fafc;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }
    input, button, select, textarea {
      font-family: inherit;
    }
    /* 隱藏滾動條但保留滾動功能 */
    ::-webkit-scrollbar { width: 0; background: transparent; }

    /* 列印模式：只顯示報告內容，隱藏所有 UI 元素 */
    @media print {
      body { background: #fff !important; margin: 0 !important; padding: 0 !important; }
      @page { margin: 8mm 10mm; size: A4; }
      /* 隱藏導覽列、按鈕、步驟條 */
      #nav-bar { display: none !important; }
      #report-action-btns { display: none !important; }
      /* 隱藏非報告頁的所有模組 */
      #root > div > div > div:not(#report-page) { display: none !important; }
      /* 報告頁底部 padding 歸零 */
      #root > div > div { padding-bottom: 0 !important; }
      /* 確保背景色正確列印 */
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel（透過 CDN 載入，讓瀏覽器直接執行 JSX） -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;


const SYMPTOMS = [
  { id: "stomach",       label: "胃易不舒服",   nutrients: ["P"],                                          special: [] },
  { id: "medication",    label: "常吃藥",        nutrients: ["B", "C"],                                     special: [] },
  { id: "fatigue",       label: "疲倦",          nutrients: ["P", "B", "Ca"],                               special: ["益生菌"] },
  { id: "sneezing",      label: "過敏打噴嚏",    nutrients: ["P", "A", "C", "E"],                           special: [] },
  { id: "constipation",  label: "便秘",          nutrients: ["Ca", "纖維"],                                 special: ["水", "益生菌"] },
  { id: "coldHands",     label: "手腳冰冷",      nutrients: ["P", "卵"],                                    special: ["月見草"] },
  { id: "stress",        label: "壓力熬夜",      nutrients: ["P", "B", "Ca"],                               special: [] },
  { id: "coldOften",     label: "常感冒",        nutrients: ["P", "A", "C"],                                special: ["紫錐花"] },
  { id: "acne",          label: "青春痘",        nutrients: ["A", "B", "P", "C"],                           special: [] },
  { id: "skinAllergy",   label: "皮膚過敏發炎",  nutrients: ["P", "B", "C", "Ca"],                          special: [] },
  { id: "irregular",     label: "經期不順",      nutrients: ["P"],                                          special: ["月見草"] },
  { id: "anxiety",       label: "憂鬱沮喪",      nutrients: ["P", "B", "Ca", "魚油", "卵"],                 special: [] },
  { id: "memory",        label: "記憶力減退",    nutrients: ["P", "鐵", "卵"],                              special: ["管花肉蓯蓉"] },
  { id: "insomnia",      label: "失眠睡不好",    nutrients: ["B", "Ca", "P"],                               special: ["好甘萃"] },
  { id: "osteo",         label: "骨質疏鬆",      nutrients: ["C", "Ca"],                                    special: [] },
  { id: "cramp",         label: "抽筋",          nutrients: ["B", "Ca"],                                    special: [] },
  { id: "gout",          label: "尿酸高(痛風)",  nutrients: ["P", "B", "C"],                                special: ["水"] },
  { id: "obese",         label: "肥胖／水腫",    nutrients: ["P", "B", "卵", "纖維", "魚油"],               special: [] },
  { id: "anemia",        label: "貧血",          nutrients: ["P", "B", "E", "鐵"],                          special: [] },
  { id: "menopause",     label: "更年期",        nutrients: ["B", "C", "Ca", "E", "P", "鐵"],               special: [] },
  { id: "smoking",       label: "抽菸喝酒檳榔",  nutrients: ["A", "B", "C", "E"],                           special: [] },
  { id: "floaters",      label: "飛蚊症",        nutrients: ["A", "C"],                                     special: ["晶明+金盞花葉黃素"] },
  { id: "metabolic",     label: "三C族",         nutrients: ["A", "B"],                                     special: ["晶明+金盞花葉黃素"] },
  { id: "headache",      label: "偏頭痛",        nutrients: ["B", "C", "Ca", "卵", "鐵"],                   special: [] },
  { id: "tired_morning", label: "上班沒精神",    nutrients: ["P", "B", "Ca"],                               special: ["益生菌"] },
  { id: "tired_night",   label: "下班想睡覺",    nutrients: ["P", "B", "Ca"],                               special: [] },
  { id: "threehigh",     label: "三高",          nutrients: ["P", "魚油", "卵"],                            special: ["綠茶素"] },
  { id: "joint",         label: "肌肉關節酸痛",  nutrients: ["P", "B", "E", "Ca", "魚油"],                  special: ["關鍵行動力蛋白素"] },
  { id: "hairloss",      label: "落髮分叉禿頭",  nutrients: ["P", "B", "卵"],                               special: [] },
  { id: "libido",        label: "性事缺缺",      nutrients: ["A", "P"],                                     special: ["管花肉蓯蓉", "大蒜片"] },
];

const NUTRIENT_KEYS = ["P", "A", "B", "C", "E", "Ca", "鐵", "卵", "纖維", "魚油"];
const NUTRIENT_LABELS = {
  P: "蛋白質", A: "維生素A", B: "維生素B", C: "維生素C", E: "維生素E",
  Ca: "鈣鎂", 鐵: "鐵", 卵: "卵磷脂", 纖維: "纖維", 魚油: "魚油"
};
const SPECIAL_KEYS = ["益生菌", "月見草", "紫錐花", "管花肉蓯蓉", "好甘萃", "晶明+金盞花葉黃素", "綠茶素", "關鍵行動力蛋白素", "大蒜片", "水"];
const M1_STEPS = ["基本資料", "生活習慣", "症狀評估", "分析結果"];
const M1_STEP_ICONS = ["👤", "🌙", "🩺", "📊"];

const LEVEL_MAP = [
  { label: "無需求",   color: "#9ca3af", fill: "#f9fafb", bar: 0 },
  { label: "輕度需求", color: "#16a34a", fill: "#dcfce7", bar: 25 },
  { label: "中度需求", color: "#2563eb", fill: "#dbeafe", bar: 55 },
  { label: "較高需求", color: "#d97706", fill: "#fef3c7", bar: 75 },
  { label: "強烈需求", color: "#dc2626", fill: "#fee2e2", bar: 100 },
];

function getLevel(count) {
  if (count === 0) return LEVEL_MAP[0];
  if (count === 1) return LEVEL_MAP[1];
  if (count === 2) return LEVEL_MAP[2];
  if (count === 3) return LEVEL_MAP[3];
  return LEVEL_MAP[4];
}

function LifestyleConsultation({ onViewProducts }) {
  const [step, setStep] = useState(0);
  const [profile, setProfile] = useState({ name: "", gender: "", age: "", height: "", weight: "" });
  const [habits, setHabits] = useState({
    breakfast: "", bedtime: "", water: "", waterFilter: "",
    supplement: "", supplementBrand: ""
  });
  const [selected, setSelected] = useState({});
  const [exporting, setExporting] = useState(false);
  const [showReport, setShowReport] = useState(false);

  const toggleSymptom = (id) => setSelected(prev => ({ ...prev, [id]: !prev[id] }));
  const goStep = (n) => { setStep(n); window.scrollTo(0, 0); };

  const calcNutrients = () => {
    const counts = {};
    NUTRIENT_KEYS.forEach(k => { counts[k] = 0; });
    SYMPTOMS.forEach(s => {
      if (selected[s.id]) {
        s.nutrients.forEach(n => { if (counts[n] !== undefined) counts[n]++; });
      }
    });
    return counts;
  };

  const nutrients = calcNutrients();
  const selectedCount = Object.values(selected).filter(Boolean).length;

  const topNutrients = NUTRIENT_KEYS
    .map(k => ({ key: k, count: nutrients[k], label: NUTRIENT_LABELS[k] }))
    .filter(n => n.count > 0)
    .sort((a, b) => b.count - a.count);

  const selectedSymptoms = SYMPTOMS.filter(s => selected[s.id]);

  // 計算特殊成分需求
  const specialCounts = {};
  SPECIAL_KEYS.forEach(k => { specialCounts[k] = 0; });
  selectedSymptoms.forEach(s => {
    s.special.forEach(sp => { if (specialCounts[sp] !== undefined) specialCounts[sp]++; });
  });
  const topSpecials = SPECIAL_KEYS
    .map(k => ({ key: k, count: specialCounts[k] }))
    .filter(n => n.count > 0)
    .sort((a, b) => b.count - a.count);

  // 組合 M3 推薦 Keys（營養素代碼 + 特殊成分名稱，排除「水」）
  const recommendedKeys = [
    ...topNutrients.map(n => n.key),
    ...topSpecials.map(s => s.key).filter(k => k !== "水"),
  ];

  const waterDisplay = habits.water === "家用淨水器" && habits.waterFilter
    ? `家用淨水器（${habits.waterFilter}）`
    : habits.water;
  const suppDisplay = habits.supplement === "有" && habits.supplementBrand
    ? `有（${habits.supplementBrand}）`
    : habits.supplement;

  const exportPDF = () => {
    setExporting(true);
    const date = new Date().toLocaleString("zh-TW");
    const nutrientRows = NUTRIENT_KEYS.map(k => {
      const lv = getLevel(nutrients[k]);
      const pct = lv.bar;
      return `
        <tr>
          <td style="padding:8px 12px;font-size:15px;font-weight:600;color:#374151;">${NUTRIENT_LABELS[k]}</td>
          <td style="padding:8px 12px;">
            <div style="background:#f3f4f6;border-radius:6px;height:12px;width:100%;">
              <div style="background:${lv.color};height:12px;border-radius:6px;width:${pct}%;"></div>
            </div>
          </td>
          <td style="padding:8px 12px;">
            <span style="background:${lv.fill};color:${lv.color};border-radius:20px;padding:3px 12px;font-size:13px;font-weight:700;white-space:nowrap;">
              ${lv.label}${nutrients[k] > 0 ? ` ×${nutrients[k]}` : ""}
            </span>
          </td>
        </tr>`;
    }).join("");

    const symptomTags = selectedSymptoms.length > 0
      ? selectedSymptoms.map(s => `<span style="display:inline-block;background:#dcfce7;border:1px solid #86efac;border-radius:20px;padding:5px 14px;font-size:14px;color:#15803d;font-weight:600;margin:3px;">${s.label}</span>`).join("")
      : '<span style="color:#9ca3af;">（無勾選症狀）</span>';

    const topRows = topNutrients.length > 0
      ? topNutrients.map((n, i) => {
          const medals = ["🥇", "🥈", "🥉"];
          return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f3f4f6;">
            <span style="font-size:20px;width:28px;">${i < 3 ? medals[i] : `${i+1}.`}</span>
            <span style="flex:1;font-size:15px;font-weight:600;color:#1f2937;">${n.label}</span>
            <span style="background:#fef3c7;color:#92400e;border-radius:20px;padding:3px 12px;font-size:13px;font-weight:700;">需求 ×${n.count}</span>
          </div>`;
        }).join("")
      : '<p style="color:#9ca3af;">（無症狀資料）</p>';

    const specialRows = topSpecials.length > 0
      ? topSpecials.map((n, i) => `
          <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:6px;background:${i===0?"#f5f3ff":"#fafafa"};border:1px solid ${i===0?"#c4b5fd":"#e5e7eb"};border-radius:10px;">
            <div style="width:28px;height:28px;border-radius:50%;background:${i===0?"#7c3aed":"#e5e7eb"};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:${i===0?"#fff":"#6b7280"};flex-shrink:0;">${i+1}</div>
            <span style="flex:1;font-size:15px;font-weight:600;color:#374151;">${n.key}</span>
            <span style="background:${i===0?"#ede9fe":"#f3f4f6"};color:${i===0?"#7c3aed":"#6b7280"};border-radius:20px;padding:3px 12px;font-size:13px;font-weight:700;">×${n.count} 症狀</span>
          </div>`).join("")
      : '<p style="color:#9ca3af;font-size:14px;">（無特殊成分建議）</p>';

    const html = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>生活習慣分析報告 - ${profile.name}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', 'PingFang TC', sans-serif; background: #f0fdf4; padding: 20px; color: #1a2e1a; }
  .page { max-width: 680px; margin: 0 auto; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .header { background: linear-gradient(135deg, #15803d, #166534); padding: 28px 32px; color: #fff; }
  .header h1 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
  .header p { font-size: 13px; color: #86efac; letter-spacing: 2px; }
  .profile-band { background: linear-gradient(135deg, #166534, #14532d); padding: 20px 32px; display: flex; gap: 20px; flex-wrap: wrap; }
  .profile-item { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 10px 18px; text-align: center; min-width: 80px; }
  .profile-item .val { font-size: 20px; font-weight: 800; color: #fff; }
  .profile-item .lbl { font-size: 12px; color: #86efac; margin-top: 2px; }
  .section { padding: 22px 32px; border-bottom: 1px solid #f0fdf4; }
  .section-title { font-size: 17px; font-weight: 800; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .habits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .habit-item { background: #f0fdf4; border-radius: 10px; padding: 10px 14px; }
  .habit-item .hl { font-size: 12px; color: #6b7280; margin-bottom: 3px; }
  .habit-item .hv { font-size: 15px; font-weight: 600; color: #15803d; }
  table { width: 100%; border-collapse: collapse; }
  .footer { padding: 18px 32px; background: #fffbeb; border-top: 1px solid #fde68a; }
  .footer p { font-size: 13px; color: #92400e; line-height: 1.7; }
  @media print {
    body { padding: 0; background: #fff; }
    .page { box-shadow: none; border-radius: 0; }
    @page { margin: 10mm; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>🌿 生活習慣諮詢 評估報告</h1>
    <p>LIFESTYLE LIFESTYLE ANALYSIS REPORT</p>
  </div>
  <div class="profile-band">
    <div class="profile-item"><div class="val">${profile.name}</div><div class="lbl">${profile.gender}性</div></div>
    <div class="profile-item"><div class="val">${profile.age}<span style="font-size:13px;">歲</span></div><div class="lbl">年齡</div></div>
    <div class="profile-item"><div class="val">${profile.height}<span style="font-size:13px;">cm</span></div><div class="lbl">身高</div></div>
    <div class="profile-item"><div class="val">${profile.weight}<span style="font-size:13px;">kg</span></div><div class="lbl">體重</div></div>
    <div class="profile-item"><div class="val">${selectedCount}<span style="font-size:13px;">項</span></div><div class="lbl">勾選症狀</div></div>
  </div>

  <div class="section">
    <div class="section-title" style="color:#15803d;">🌙 生活習慣</div>
    <div class="habits-grid">
      <div class="habit-item"><div class="hl">早餐時間</div><div class="hv">${habits.breakfast}</div></div>
      <div class="habit-item"><div class="hl">就寢時間</div><div class="hv">${habits.bedtime}</div></div>
      <div class="habit-item"><div class="hl">飲用水來源</div><div class="hv">${waterDisplay}</div></div>
      <div class="habit-item"><div class="hl">營養補充品</div><div class="hv">${suppDisplay}</div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title" style="color:#374151;">📋 勾選症狀（${selectedSymptoms.length} 項）</div>
    <div>${symptomTags}</div>
  </div>

  <div class="section">
    <div class="section-title" style="color:#7c3aed;">🌿 建議特殊成分</div>
    <p style="font-size:12px;color:#9ca3af;margin-bottom:10px;">依勾選症狀建議，非一般營養素另列供參考</p>
    ${specialRows}
  </div>

  <div class="section">
    <div class="section-title" style="color:#92400e;">⭐ 全部營養素需求排名</div>
    ${topRows}
  </div>

  <div class="section">
    <div class="section-title" style="color:#15803d;">🧬 營養素需求分析</div>
    <table>${nutrientRows}</table>
  </div>

  <div class="footer">
    <p>⚠️ 本報告僅供參考，不代表醫療診斷。如有健康疑慮，請諮詢專業醫師或營養師。</p>
    <p style="margin-top:6px;color:#a16207;">報告產生時間：${date}</p>
  </div>
</div>
<div style="text-align:center;padding:16px 32px 24px;background:#f0fdf4;">
    <button onclick="window.print()" style="background:linear-gradient(135deg,#15803d,#16a34a);color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;">
      🖨️ 列印 / 儲存為 PDF
    </button>
    <p style="font-size:12px;color:#6b7280;margin-top:8px;">點擊後選擇「另存為 PDF」</p>
  </div>
</body>
</html>`;

    const encoded = "data:text/html;charset=utf-8," + encodeURIComponent(html);
    const a = document.createElement("a");
    a.href = encoded;
    a.download = `生活習慣分析報告_${profile.name}_${new Date().toISOString().slice(0,10)}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setExporting(false);
  };

  const resetAll = () => {
    goStep(0);
    setProfile({ name: "", gender: "", age: "", height: "", weight: "" });
    setHabits({ breakfast: "", bedtime: "", water: "", waterFilter: "", supplement: "", supplementBrand: "" });
    setSelected({});
    setShowReport(false);
  };

  return (
    <div style={{
      minHeight: "100vh", background: "#f0fdf4",
      fontFamily: "'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif",
      color: "#1a2e1a", maxWidth: 480, margin: "0 auto",
    }}>
      {/* Sticky Header */}
      <div style={{
        background: "linear-gradient(135deg, #15803d, #166534)",
        padding: "18px 20px 0",
        position: "sticky", top: 0, zIndex: 100,
        boxShadow: "0 2px 12px rgba(21,128,61,0.25)",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
          <div style={{
            width: 46, height: 46, borderRadius: 14,
            background: "rgba(255,255,255,0.2)",
            display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24,
          }}>🌿</div>
          <div>
            <div style={{ fontSize: 20, fontWeight: 800, color: "#fff" }}>生活習慣諮詢</div>
            <div style={{ fontSize: 12, color: "#86efac", letterSpacing: 2 }}>健康評估問卷</div>
          </div>
        </div>
        <div style={{ display: "flex" }}>
          {M1_STEPS.map((s, i) => (
            <div key={i} style={{
              flex: 1, textAlign: "center", padding: "10px 4px 12px",
              background: i === step ? "#fff" : "transparent",
              borderRadius: i === step ? "8px 8px 0 0" : 0,
              transition: "all 0.2s",
            }}>
              <div style={{ fontSize: 18, marginBottom: 2 }}>{M1_STEP_ICONS[i]}</div>
              <div style={{
                fontSize: 12, fontWeight: i === step ? 700 : 400,
                color: i === step ? "#15803d" : i < step ? "#86efac" : "rgba(255,255,255,0.5)",
              }}>{s}</div>
              {i < step && <div style={{ fontSize: 10, color: "#86efac" }}>✓ 完成</div>}
            </div>
          ))}
        </div>
      </div>

      <div style={{ padding: "22px 16px 100px" }}>

        {/* ── STEP 0 基本資料 ── */}
        {step === 0 && (
          <div>
            <M1_PageTitle title="請填寫基本資料" desc="填寫後可產生個人化評估結果" />
            <M1_Card>
              <M1_FieldLabel>姓名</M1_FieldLabel>
              <M1_LargeInput value={profile.name} onChange={v => setProfile(p => ({ ...p, name: v }))} placeholder="請輸入您的姓名" />
            </M1_Card>
            <M1_Card>
              <M1_FieldLabel>性別</M1_FieldLabel>
              <div style={{ display: "flex", gap: 12 }}>

                marginBottom: 20, paddingBottom: 20,
                borderBottom: "1px solid #fffbeb",

                  fontSize: 14, fontWeight: 800, color: "#92400e",

                  textTransform: "uppercase", letterSpacing: 1,
                }}>

                    width: 4, height: 16, background: "#d97706", borderRadius: 2, display: "inline-block",

                  <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 6 }}>

                      return (
                        <div key={n.key} style={{
                          display: "flex", alignItems: "center", gap: 8,
                          padding: "8px 12px",

                          border: i < 3 ? "1px solid #fde68a" : "1px solid #f3f4f6",
                        }}>
                          <span style={{ fontSize: 18, flexShrink: 0 }}>{i < 3 ? medals[i] : ""}</span>
                          <span style={{ flex: 1, fontSize: 13, fontWeight: 700, color: "#1f2937" }}>{n.label}</span>
                          <span style={{
                            fontSize: 12, fontWeight: 700, color: "#92400e",
                            background: "#fef3c7", borderRadius: 20, padding: "2px 8px",

                        </div>

                  fontSize: 14, fontWeight: 800, color: "#15803d",
                  marginBottom: 12, display: "flex", alignItems: "center", gap: 6,
                  textTransform: "uppercase", letterSpacing: 1,
                }}>
                  <span style={{
                    width: 4, height: 16, background: "#15803d", borderRadius: 2, display: "inline-block",
                  }}/>
                  營養素需求分析
                </div>
                <div style={{
                  background: "#fafafa", borderRadius: 12, padding: "12px 16px",
                  border: "1px solid #f0fdf4",
                }}>
                  {[
                      ...topNutrients,
                      ...NUTRIENT_KEYS
                        .filter(k => nutrients[k] === 0)
                        .map(k => ({ key: k, count: 0, label: NUTRIENT_LABELS[k] }))
                    ].map((n, idx, arr) => {
                    const k = n.key;
                    const lv = getLevel(nutrients[k]);
                    return (
                      <div key={k} style={{
                        display: "flex", alignItems: "center", gap: 10,
                        padding: "7px 0",
                        borderBottom: idx < arr.length - 1 ? "1px solid #f3f4f6" : "none",
                      }}>
                        <div style={{
                          width: 52, fontSize: 12, fontWeight: 700,
                          color: "#374151", flexShrink: 0,
                        }}>{NUTRIENT_LABELS[k]}</div>
                        <div style={{ flex: 1, background: "#e5e7eb", borderRadius: 99, height: 8 }}>
                          <div style={{
                            background: lv.color, height: 8,
                            borderRadius: 99, width: lv.bar + "%",
                          }} />
                        </div>
                        <span style={{
                          background: lv.fill, color: lv.color,
                          borderRadius: 99, padding: "2px 10px",
                          fontSize: 11, fontWeight: 800,
                          flexShrink: 0, minWidth: 60, textAlign: "center",
                        }}>{lv.label}</span>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* 免責聲明 */}
              <div style={{
                background: "#fffbeb", border: "1px solid #fde68a",
                borderRadius: 10, padding: "12px 16px", marginBottom: 20,
              }}>

                </div>
                <div style={{ fontSize: 11, color: "#a16207", marginTop: 4 }}>
                  產生時間：{new Date().toLocaleString("zh-TW")}
                </div>
              </div>

              {/* 操作按鈕 */}
              <div id="report-action-btns">
                <button onClick={async () => {
                  const btn = document.getElementById("report-action-btns");
                  btn.style.display = "none";
                  try {
                    const el = document.getElementById("report-page");
                    const canvas = await html2canvas(el, {
                      scale: 2,
                      useCORS: true,
                      backgroundColor: "#ffffff",
                      logging: false,
                    });
                    const { jsPDF } = window.jspdf;
                    const imgData = canvas.toDataURL("image/jpeg", 0.95);
                    const imgW = canvas.width;
                    const imgH = canvas.height;
                    const pdfW = 210;
                    const pdfH = Math.round((imgH * pdfW) / imgW);
                    const pdf = new jsPDF({
                      orientation: pdfH > pdfW ? "portrait" : "landscape",
                      unit: "mm",
                      format: [pdfW, pdfH],
                    });
                    pdf.addImage(imgData, "JPEG", 0, 0, pdfW, pdfH);
                    const date = new Date().toISOString().slice(0,10).replace(/-/g,"");
                    pdf.save(`生活習慣分析報告_${profile.name}_${date}.pdf`);
                  } catch(e) {
                    alert("PDF 產生失敗，請截圖儲存。");
                  } finally {
                    btn.style.display = "block";
                  }
                }} style={{
                  width: "100%", padding: "16px", borderRadius: 14, border: "none", cursor: "pointer",
                  background: "linear-gradient(135deg,#0369a1,#0284c7)",
                  color: "#fff", fontWeight: 700, fontSize: 16, marginBottom: 10,
                  boxShadow: "0 4px 12px rgba(3,105,161,0.3)",
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
                }}>📥 下載 PDF 報告</button>
                <button onClick={() => { setShowReport(false); window.scrollTo(0,0); }} style={{
                  width: "100%", padding: "15px", borderRadius: 14,
                  border: "2px solid #15803d", background: "#fff",
                  color: "#15803d", fontWeight: 700, fontSize: 16, cursor: "pointer",
                }}>← 返回分析結果</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

  danger: { label: "異常", color: "#dc2626", bg: "#fee2e2", border: "#fca5a5", icon: "✕" },
  empty:  { label: "未填",  color: "#9ca3af", bg: "#f9fafb", border: "#e5e7eb", icon: "–" },
};

// ── 判斷等級 ─────────────────────────────────────────────────
function evaluateField(fieldKey, value, gender) {
  const field = FIELDS[fieldKey];
  if (field.isBMI) return null;
  if (!value || value === "") return "empty";
  const num = parseFloat(value);
  if (isNaN(num)) return "empty";

  const applicableRanges = field.ranges.filter(r => r.gender === null || r.gender === gender);

  // 特殊處理低值 warn
  const lowRange = applicableRanges.find(r => r.label === "偏低" || r.label === "建議就醫" && r.min === -Infinity);

  // 找第一個符合的 range（priority: danger > warn > normal）
  const priorityOrder = ["danger", "warn", "normal"];
  for (const level of priorityOrder) {
    const match = applicableRanges.find(r => r.level === level && num >= r.min && num < r.max);
    if (match) return level;
  }
  return "normal";
}

function evaluateBMI(height, weight) {
  if (!height || !weight) return null;
  const h = parseFloat(height) / 100;
  const w = parseFloat(weight);
  if (isNaN(h) || isNaN(w) || h <= 0) return null;
  const bmi = w / (h * h);
  return { value: bmi.toFixed(1), level: bmi < 18.5 ? "warn" : bmi < 24.9 ? "normal" : bmi < 27 ? "warn" : "danger" };
}

            {/* 分組完整結果 */}

              const hasData = group.fields.some(k => {
                if (k === "height" || k === "weight") return !!bmi;
                return values[k] && values[k] !== "";

              return (
                <div key={group.id} style={{
                  background: "#fff", borderRadius: 18, padding: "18px 20px", marginBottom: 16,
                  border: `2px solid ${group.borderColor}`,
                  boxShadow: "0 2px 10px rgba(0,0,0,0.06)",

                  <div style={{ fontSize: 17, fontWeight: 800, color: group.color, marginBottom: 14, display: "flex", alignItems: "center", gap: 8 }}>
                    <span>{group.icon}</span>{group.label}
                  </div>

                  {/* BMI 行 */}
                  {group.id === "body_blood" && bmi && (
                    <M2_ResultRow
                      label="BMI"
                      abbr="BMI"
                      value={bmi.value}
                      unit="—"
                      status={bmi.level}
                    />
                  )}

                  {group.fields.filter(k => k !== "height" && k !== "weight").map(key => {
                    if (!values[key] || values[key] === "") return null;
                    const f = FIELDS[key];
                    const status = getStatus(key);
                    return (
                      <M2_ResultRow
                        key={key}
                        label={f.label}
                        abbr={f.abbr}
                        value={values[key]}
                        unit={f.unit}
                        status={status}
                      />
                    );
                  })}
                </div>
              );
            })}

            {/* 未填提醒 */}
            {filledCount === 0 && (
              <div style={{
                background: "#f9fafb", border: "2px dashed #d1d5db",
                borderRadius: 16, padding: "32px", textAlign: "center",

                background: "#e2e8f0", borderRadius: 20,
                padding: "6px 16px", fontSize: 12, color: "#64748b", fontWeight: 600,
              }}>即將推出 — 待後端串接</div>
            </div>

            {/* 免責聲明 */}
            <div style={{
              background: "#fffbeb", border: "1px solid #fde68a",
              borderRadius: 12, padding: "14px 16px", marginBottom: 18,
            }}>
              <div style={{ fontSize: 14, color: "#92400e", lineHeight: 1.8, display: "flex", gap: 8 }}>

              </div>
            </div>

            <div style={{ display: "flex", gap: 10 }}>
              <M2_BackBtn onClick={() => goStep(1)} />
              <button onClick={() => {
                goStep(0);
                setValues({});
                setName("");
                setGender("");
                setExamDate("");
                setActiveGroup("blood_sugar");
              }} style={{
                flex: 1, padding: "16px", borderRadius: 14, border: "none", cursor: "pointer",
                background: "linear-gradient(135deg,#0369a1,#0284c7)",
                color: "#fff", fontWeight: 700, fontSize: 17,
                boxShadow: "0 4px 12px rgba(3,105,161,0.3)",
              }}>🔄 重新填寫</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const CATEGORIES = ["全部", "基礎營養", "心血管", "腸胃保健", "體態代謝", "免疫活力", "專項保健"];

const CAT_ICONS = {
  "全部": "🌿", "基礎營養": "💊", "心血管": "🫀", "腸胃保健": "🦠",
  "體態代謝": "⚖️", "免疫活力": "🛡️", "專項保健": "✨",
};

const CAT_MAP = {
  "基礎營養": "基礎營養", "全方位補充": "基礎營養",
  "心血管保健": "心血管",
  "腸道保健": "腸胃保健", "腸胃保健": "腸胃保健",
  "體態管理": "體態代謝", "代謝保健": "體態代謝",
  "免疫保健": "免疫活力", "活力保健": "免疫活力",
  "護眼保健": "專項保健", "睡眠保健": "專項保健",
  "關節保健": "專項保健", "女性保健": "專項保健",
};

// ── 主元件 ───────────────────────────────────────────────
function NutritionProducts({ recommendedKeys = [], onBackToM1 }) {
  const [activeCategory, setActiveCategory] = useState("全部");
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [showRecommendedOnly, setShowRecommendedOnly] = useState(false);
  const [searchText, setSearchText] = useState("");

  // 當 recommendedKeys 從外部更新時（M1 跳轉），自動切換到推薦模式
  useEffect(() => {
    if (recommendedKeys.length > 0) {
      setShowRecommendedOnly(true);
      setActiveCategory("全部");
      setSearchText("");
    }
  }, [recommendedKeys]);

  // 計算推薦產品 IDs
  const recommendedIds = new Set();
  recommendedKeys.forEach(key => {
    (SPECIAL_MAPPING[key] || []).forEach(id => recommendedIds.add(id));
    (NUTRIENT_MAPPING[key] || []).forEach(id => recommendedIds.add(id));
  });
  // 全方位產品永遠推薦
  PRODUCTS.filter(p => p.forAll).forEach(p => recommendedIds.add(p.id));

  const filteredProducts = PRODUCTS.filter(p => {
    if (showRecommendedOnly && recommendedIds.size > 0 && !recommendedIds.has(p.id)) return false;
    if (activeCategory !== "全部" && CAT_MAP[p.category] !== activeCategory) return false;
    if (searchText && !p.name.includes(searchText) && !p.subtitle.includes(searchText) &&
        !p.tags.some(t => t.includes(searchText))) return false;
    return true;
  }).sort((a, b) => {
    // ── 推薦模式排序 ──────────────────────────────────────────
    if (showRecommendedOnly && recommendedIds.size > 0) {
      const aRec = recommendedIds.has(a.id);
      const bRec = recommendedIds.has(b.id);

      // 1. forAll 優先，forAll 之間依 id 排序（p21 DOUBLE X 先，p01 優質蛋白素後）
      if (a.forAll && !b.forAll) return -1;
      if (!a.forAll && b.forAll) return 1;
      if (a.forAll && b.forAll) {
        const forAllOrder = { "p21": 0 };
        return (forAllOrder[a.id] ?? 99) - (forAllOrder[b.id] ?? 99);
      }

      // 2. 推薦 vs 非推薦
      if (aRec && !bRec) return -1;
      if (!aRec && bRec) return 1;

      // 3. 推薦產品之間：依 recommendedKeys 的順序（缺乏營養素排名）
      if (aRec && bRec) {
        const getKeyIndex = (product) => {
          let minIdx = Infinity;
          recommendedKeys.forEach((key, idx) => {
            const ids = [
              ...(SPECIAL_MAPPING[key] || []),
              ...(NUTRIENT_MAPPING[key] || [])
            ];
            if (ids.includes(product.id)) {
              minIdx = Math.min(minIdx, idx);
            }
          });
          return minIdx;
        };
        const aIdx = getKeyIndex(a);
        const bIdx = getKeyIndex(b);
        if (aIdx !== bIdx) return aIdx - bIdx;
        // 同排名內 fiberPrimary 優先
        if (a.fiberPrimary && !b.fiberPrimary) return -1;
        if (!a.fiberPrimary && b.fiberPrimary) return 1;
      }

      return 0;
    }

    // ── 全部瀏覽排序：依分類 → 同分類內依價格低到高 ──────────
    const catOrder = { "基礎營養": 0, "心血管": 1, "腸胃保健": 2, "體態代謝": 3, "免疫活力": 4, "專項保健": 5 };
    const aCat = catOrder[CAT_MAP[a.category]] ?? 99;
    const bCat = catOrder[CAT_MAP[b.category]] ?? 99;
    if (aCat !== bCat) return aCat - bCat;
    return a.price - b.price;
  });

  if (selectedProduct) {
    return (
      <ProductDetail
        product={selectedProduct}
        isRecommended={recommendedIds.has(selectedProduct.id)}
        onBack={() => setSelectedProduct(null)}
        onBackToM1={onBackToM1}
      />
    );
  }

  return (
    <div style={{
      minHeight: "100vh",
      background: "#fffbf5",
      fontFamily: "'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif",
      maxWidth: 480, margin: "0 auto",
      color: "#1c1917",
    }}>
      {/* Header */}
      <div style={{
        background: "linear-gradient(135deg, #c2410c, #ea580c)",
        padding: "18px 20px 0",
        position: "sticky", top: 0, zIndex: 100,
        boxShadow: "0 2px 16px rgba(194,65,12,0.3)",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
          {onBackToM1 && (
            <button onClick={onBackToM1} style={{
              background: "rgba(255,255,255,0.2)", border: "none", borderRadius: 12,
              width: 42, height: 42, fontSize: 20, cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
              flexShrink: 0,
            }}>←</button>
          )}
          <div style={{
            width: 46, height: 46, borderRadius: 14,
            background: "rgba(255,255,255,0.2)",
            display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24,
            flexShrink: 0,
          }}>🌿</div>
          <div>
            <div style={{ fontSize: 20, fontWeight: 800, color: "#fff" }}>營養品介紹</div>
            <div style={{ fontSize: 12, color: "#fed7aa", letterSpacing: 2 }}>
              共 {filteredProducts.length} / {PRODUCTS.length} 項產品
            </div>
          </div>
          {recommendedIds.size > 0 && (
            <button onClick={() => setShowRecommendedOnly(!showRecommendedOnly)} style={{
              marginLeft: "auto",
              background: showRecommendedOnly ? "#fff" : "rgba(255,255,255,0.2)",
              color: showRecommendedOnly ? "#c2410c" : "#fff",
              border: "none", borderRadius: 20,
              padding: "8px 14px", fontSize: 13, fontWeight: 700,
              cursor: "pointer",
            }}>
              {showRecommendedOnly ? "✨ 推薦中" : "全部"}
            </button>
          )}
        </div>

        {/* Search */}
        <div style={{
          background: "rgba(255,255,255,0.15)",
          borderRadius: 12, padding: "10px 14px",
          display: "flex", alignItems: "center", gap: 8,
          marginBottom: 14,
        }}>
          <span style={{ fontSize: 16 }}>🔍</span>
          <input
            value={searchText}
            onChange={e => setSearchText(e.target.value)}
            placeholder="搜尋產品名稱或功效..."
            style={{
              flex: 1, background: "transparent", border: "none", outline: "none",
              color: "#fff", fontSize: 15, fontFamily: "inherit",
            }}
          />
          {searchText && (
            <button onClick={() => setSearchText("")} style={{
              background: "none", border: "none", color: "rgba(255,255,255,0.7)",
              cursor: "pointer", fontSize: 16, padding: 0,
            }}>✕</button>
          )}
        </div>

        {/* Category Tabs */}
        <div style={{
          display: "flex", gap: 6, overflowX: "auto", paddingBottom: 14,
          scrollbarWidth: "none",
        }}>
          {CATEGORIES.map(cat => (
            <button key={cat} onClick={() => setActiveCategory(cat)} style={{
              flexShrink: 0,
              padding: "8px 12px", borderRadius: 20, cursor: "pointer",
              border: activeCategory === cat ? "none" : "1px solid rgba(255,255,255,0.3)",
              background: activeCategory === cat ? "#fff" : "transparent",
              color: activeCategory === cat ? "#c2410c" : "rgba(255,255,255,0.85)",
              fontSize: 13, fontWeight: activeCategory === cat ? 700 : 500,
              display: "flex", alignItems: "center", gap: 4,
            }}>
              <span>{CAT_ICONS[cat]}</span>{cat}
            </button>
          ))}
        </div>
      </div>

      {/* Product List */}
      <div style={{ padding: "16px 16px 100px" }}>
        {recommendedIds.size > 0 && showRecommendedOnly && (
          <div style={{
            background: "linear-gradient(135deg, #fff7ed, #ffedd5)",
            border: "1.5px solid #fed7aa",
            borderRadius: 14, padding: "12px 16px", marginBottom: 16,
            display: "flex", alignItems: "center", gap: 10,
          }}>
            <span style={{ fontSize: 24 }}>✨</span>
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#c2410c" }}>
                依您的評估結果推薦
              </div>
              <div style={{ fontSize: 13, color: "#9a3412" }}>
                共 {[...recommendedIds].length} 項產品符合您的需求
              </div>
            </div>
          </div>
        )}

        {filteredProducts.length === 0 ? (
          <div style={{
            textAlign: "center", padding: "48px 20px",
            color: "#9ca3af",
          }}>
            <div style={{ fontSize: 40, marginBottom: 10 }}>🔍</div>
            <div style={{ fontSize: 16, fontWeight: 700 }}>找不到相符產品</div>
            <div style={{ fontSize: 14, marginTop: 6 }}>試試其他關鍵字或分類</div>
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {filteredProducts.map(product => (
              <ProductCard
                key={product.id}
                product={product}
                isRecommended={recommendedIds.has(product.id)}
                onSelect={() => setSelectedProduct(product)}
              />
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── 產品卡片 ─────────────────────────────────────────────

                  background: "#fef3c7", color: "#92400e",
                  borderRadius: 20, padding: "2px 8px",

}

      {/* 底部導覽列 */}
      <div id="nav-bar" style={{
        position: "fixed",
        bottom: 0,
        left: "50%",
        transform: "translateX(-50%)",
        width: "100%",
        maxWidth: 480,
        background: "#ffffff",
        borderTop: "1px solid #e5e7eb",
        display: "flex",
        zIndex: 200,
        boxShadow: "0 -2px 12px rgba(0,0,0,0.08)",
      }}>
        {NAV.map(tab => {
          const isActive = activeTab === tab.id;
          const colors = {
            m1: "#15803d",
            m2: "#0369a1",
            m3: "#c2410c",
            m4: "#7c3aed",
          };
          const color = colors[tab.id];
          return (
            <button
              key={tab.id}
              onClick={() => setActiveTab(tab.id)}
              style={{
                flex: 1,
                padding: "10px 0 8px",
                border: "none",
                background: "transparent",
                cursor: "pointer",
                display: "flex",
                flexDirection: "column",
                alignItems: "center",
                gap: 3,
                transition: "all 0.15s",
              }}
            >
              <div style={{
                fontSize: 22,
                lineHeight: 1,
                filter: isActive ? "none" : "grayscale(1) opacity(0.5)",
                transition: "all 0.15s",
                transform: isActive ? "scale(1.15)" : "scale(1)",
              }}>{tab.icon}</div>
              <div style={{
                fontSize: 11,
                fontWeight: isActive ? 700 : 500,
                color: isActive ? color : "#9ca3af",
                transition: "all 0.15s",
              }}>{tab.label}</div>
              {isActive && (
                <div style={{
                  position: "absolute",
                  bottom: 0,
                  width: 32,
                  height: 3,
                  borderRadius: "3px 3px 0 0",
                  background: color,
                }} />
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}
